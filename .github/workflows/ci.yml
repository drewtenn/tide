name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  VCPKG_BINARY_SOURCES: 'clear;x-gha,readwrite'

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS-arm64
            os: macos-14
            preset: macos-debug
            triplet: arm64-osx
          - name: Linux-x64
            os: ubuntu-24.04           # ADR-0039: GCC 13+ for std::expected
            preset: linux-debug
            triplet: x64-linux
          - name: Windows-x64
            os: windows-2022
            preset: windows-debug
            triplet: x64-windows

    steps:
      - uses: actions/checkout@v4

      - name: Export GitHub Actions cache for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential gcc-13 g++-13 \
            libxinerama-dev libxcursor-dev libxi-dev libxrandr-dev \
            libwayland-dev libxkbcommon-dev wayland-protocols pkg-config \
            ninja-build
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-13 100

      - name: Install macOS deps
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install ninja

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 4ebb30167f14487dcb71fac13efbf63273ab6a3f

      - name: Configure (CMake + vcpkg)
        env:
          VCPKG_ROOT: ${{ env.VCPKG_INSTALLATION_ROOT }}
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }} --output-on-failure

  tsan:
    # Phase 1 task 13: build the engine with -fsanitize=thread on Linux and
    # run the work-stealing job system stress tests. Catches data races in
    # the lock-free / mutex-protected paths that the deterministic ctest
    # cases would otherwise miss (a race that doesn't happen to corrupt
    # state on the M-series dev box can still be racing).
    name: TSAN (work-stealing job system)
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Export GitHub Actions cache for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential gcc-13 g++-13 \
            libxinerama-dev libxcursor-dev libxi-dev libxrandr-dev \
            libwayland-dev libxkbcommon-dev wayland-protocols pkg-config \
            ninja-build
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-13 100

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 4ebb30167f14487dcb71fac13efbf63273ab6a3f

      - name: Configure (linux-tsan preset)
        env:
          VCPKG_ROOT: ${{ env.VCPKG_INSTALLATION_ROOT }}
        run: cmake --preset linux-tsan

      - name: Build
        run: cmake --build --preset linux-tsan

      - name: Run ctest under TSAN
        env:
          # halt_on_error=1 — first race fails the run.
          # second_deadlock_stack=1 — full backtraces for both threads.
          # suppressions=... — Phase 1 third-party noise (see file).
          TSAN_OPTIONS: 'halt_on_error=1 second_deadlock_stack=1 suppressions=${{ github.workspace }}/tools/tsan-suppressions.txt'
        run: ctest --preset linux-tsan --output-on-failure

  threading-invariants:
    name: ADR-0007 lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Run check-threading-invariants
        run: ./tools/lint/check-threading-invariants.sh

  format:
    name: clang-format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-18

      - name: Run clang-format --dry-run -Werror
        run: |
          mapfile -t files < <(find engine samples tests -type f \
              \( -name '*.h' -o -name '*.hpp' -o -name '*.cpp' -o -name '*.mm' \) \
              ! -path '*/build/*' ! -path '*/vcpkg_installed/*')
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No source files found to lint."
            exit 0
          fi
          clang-format-18 --dry-run --Werror "${files[@]}"
